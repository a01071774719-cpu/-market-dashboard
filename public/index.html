<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>시장 동향</title>

    <!-- PWA: 홈 화면에 추가했을 때 앱처럼 동작하도록 하는 설정 -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2ebd85" />

    <!-- 안드로이드 크롬 -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- 아이폰 사파리 전용 태그 (안드로이드에는 영향 없음) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="시장 동향" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />

    <link rel="icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
    <!-- 차트 라이브러리 (v4 API 사용) -->
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="title-wrap">
        <h1>시장 동향</h1>
        <span class="subtitle">실시간 마켓 대시보드</span>
      </div>
      <div class="controls">
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </header>

    <nav class="tabbar" id="tabbar" aria-label="섹션 탭"><!-- 탭 버튼은 JS 가 생성 --></nav>

    <div class="rangebar" id="rangeBar">
      <div class="toggle" id="viewToggle" role="group" aria-label="시세/뉴스 보기" hidden>
        <button data-view="cards" class="active">시세</button>
        <button data-view="news">뉴스</button>
      </div>
      <span class="poll-status" id="pollStatus"></span>
    </div>

    <main id="sections"><!-- 섹션/카드는 JS 가 생성 --></main>

    <footer class="foot">
      데이터 출처: Yahoo Finance · 업비트 · 바이낸스 · 네이버 금융 (백엔드 프록시 경유) ·
      개인용 대시보드 · 자동 갱신 <span id="refreshSec">20</span>초 간격
    </footer>

    <script src="app.js"></script>
    <script>
      // PWA 설치 조건 충족을 위한 최소 서비스 워커 등록
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
